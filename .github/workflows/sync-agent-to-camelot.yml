name: Sync Agent Source to Camelot

# Triggers whenever agent/ code changes on main
on:
  push:
    branches:
      - main
    paths:
      - "agent/**"

jobs:
  sync:
    name: Sync agent source to x3m-ai/Camelot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Morgana (this repo)
        uses: actions/checkout@v4
        with:
          path: morgana

      - name: Checkout Camelot (public repo)
        uses: actions/checkout@v4
        with:
          repository: x3m-ai/Camelot
          token: ${{ secrets.CAMELOT_PAT }}
          path: camelot

      - name: Sync agent source to Camelot
        run: |
          DEST="camelot/morgana/morgana-agent"

          # Remove old source (keep README.md which is Camelot-specific)
          find "$DEST" -mindepth 1 \
            ! -name "README.md" \
            -exec rm -rf {} + 2>/dev/null || true

          # Copy Go source files
          cp morgana/agent/go.mod "$DEST/go.mod"
          cp morgana/agent/go.sum  "$DEST/go.sum"
          cp -r morgana/agent/cmd      "$DEST/cmd"
          cp -r morgana/agent/internal "$DEST/internal"

          echo "[INFO] Files synced:"
          find "$DEST" -type f | sort

      - name: Commit and push to Camelot
        working-directory: camelot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add morgana/morgana-agent/

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "[INFO] No changes to agent source - skipping commit"
          else
            AGENT_VERSION=$(grep -E 'Agent\s*=' morgana/agent/internal/version/version.go | grep -oP '"[^"]+"' | tr -d '"')
            git commit -m "chore: sync agent source from Morgana v${AGENT_VERSION}"
            git push
            echo "[SUCCESS] Agent source synced to Camelot (v${AGENT_VERSION})"
          fi
