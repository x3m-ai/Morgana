<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morgana - Sign In</title>
  <style>
    :root {
      --bg-base:      #1a1a1a;
      --bg-card:      #2c2c2c;
      --bg-input:     #3a3a3a;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --accent:       #667eea;
      --accent-hover: #5a6fd6;
      --danger:       #f44336;
      --warning:      #ff9800;
      --border:       #3d3d3d;
      --border-radius: 8px;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 380px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      font-size: 36px;
      font-weight: 700;
      color: #e53935;
      letter-spacing: 2px;
    }

    .brand-tagline {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .error-banner {
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid var(--danger);
      border-radius: var(--border-radius);
      color: #ff6b6b;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .warning-banner {
      background: rgba(255, 152, 0, 0.15);
      border: 1px solid var(--warning);
      border-radius: var(--border-radius);
      color: #ffb74d;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-top: 4px;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 22px 0;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #spinner {
      display: none;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 8px;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted, #555);
    }

    /* Provider icons */
    .icon { width: 22px; height: 22px; flex-shrink: 0; object-fit: contain; }

    /* Fixed provider icon-buttons row */
    .oauth-icons-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
    }

    .btn-provider {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 52px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
      flex-direction: column;
      gap: 4px;
      width: 72px;
      height: 60px;
    }

    .btn-provider:hover {
      background: #444;
      border-color: var(--accent);
    }

    .btn-provider img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .btn-provider span {
      font-size: 10px;
      color: var(--text-secondary);
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="brand">
    <div class="brand-logo">MORGANA</div>
    <div class="brand-tagline">Red Team Platform - X3M.AI</div>
  </div>

  <div class="error-banner" id="errorBanner"></div>
  <div class="warning-banner" id="warningBanner"></div>

  <!-- Local / Break Glass login form -->
  <form id="loginForm" autocomplete="on">
    <div class="form-group">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" name="email" placeholder="admin@admin.com" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" name="password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    <div id="spinner">Signing in...</div>
  </form>

  <!-- OAuth provider icon buttons (hidden - local auth only) -->
  <div id="oauthSection" style="display:none">
    <div class="divider">or continue with</div>
    <div class="oauth-icons-row">
      <button type="button" class="btn-provider" data-provider="google" title="Sign in with Google" onclick="oauthLogin('google')">
        <img src="assets/gmail-logo.png" alt="Google" />
        <span>Google</span>
      </button>
      <button type="button" class="btn-provider" data-provider="microsoft" title="Sign in with Microsoft" onclick="oauthLogin('microsoft')">
        <img src="assets/microsoft-logo.png" alt="Microsoft" />
        <span>Microsoft</span>
      </button>
      <button type="button" class="btn-provider" data-provider="github" title="Sign in with GitHub" onclick="oauthLogin('github')">
        <img src="assets/github-logo.png" alt="GitHub" />
        <span>GitHub</span>
      </button>
    </div>
  </div>

  <div class="footer-note">
    Morgana v<span id="versionLabel">...</span> &mdash; Zero data collection &bull; All local
  </div>
</div>

<script>
(function () {
  "use strict";

  var BASE = "";  // same origin

  // ------------------------------------------------------------------
  // Check if already logged in: JWT in URL fragment or localStorage
  // ------------------------------------------------------------------
  (function checkExistingAuth() {
    // Handle OAuth callback redirect: /ui/login.html#token=JWT
    var hash = window.location.hash;
    if (hash && hash.startsWith("#token=")) {
      var jwt = hash.slice(7);
      if (jwt) {
        localStorage.setItem("morgana_jwt", jwt);
        window.location.replace("/ui/");
        return;
      }
    }
    // Already logged in?
    var existing = localStorage.getItem("morgana_jwt");
    if (existing) {
      verifyAndRedirect(existing);
    }
  })();

  function verifyAndRedirect(jwt) {
    fetch(BASE + "/api/v2/auth/me", {
      headers: { "Authorization": "Bearer " + jwt }
    }).then(function (r) {
      if (r.ok) { window.location.replace("/ui/"); }
    }).catch(function () { /* ignore, show login form */ });
  }

  // ------------------------------------------------------------------
  // OAuth provider redirect (exposed globally for onclick handlers)
  // ------------------------------------------------------------------
  var _configuredProviders = [];
  var _providersLoaded = false;

  function loadProviderStatus() {
    fetch(BASE + "/api/v2/auth/providers")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        _configuredProviders = data.providers || [];
        _providersLoaded = true;
      })
      .catch(function () { _providersLoaded = true; });
  }

  window.oauthLogin = function (provider) {
    if (_providersLoaded && _configuredProviders.indexOf(provider) === -1) {
      var names = { google: "Google", microsoft: "Microsoft", github: "GitHub" };
      showError((names[provider] || provider) + " SSO is not configured on this server.");
      return;
    }
    // return_to must point to login.html so the #token= fragment is processed correctly
    window.location.href = BASE + "/api/v2/auth/oauth/" + provider
      + "?return_to=" + encodeURIComponent("/ui/login.html");
  };

  // ------------------------------------------------------------------
  // Load version
  // ------------------------------------------------------------------
  function loadVersion() {
    fetch(BASE + "/health")
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var el = document.getElementById("versionLabel");
        if (el && d.version) el.textContent = d.version;
      }).catch(function () {});
  }

  // ------------------------------------------------------------------
  // Show error from ?error= query param (set by OAuth callback on failure)
  // ------------------------------------------------------------------
  (function checkQueryError() {
    var params = new URLSearchParams(window.location.search);
    var err = params.get("error");
    if (err) showError(decodeURIComponent(err));
  })();

  function showError(msg) {
    var el = document.getElementById("errorBanner");
    el.textContent = "ERROR: " + msg;
    el.style.display = "block";
  }

  function showWarning(msg) {
    var el = document.getElementById("warningBanner");
    el.textContent = "WARNING: " + msg;
    el.style.display = "block";
  }

  function clearMessages() {
    document.getElementById("errorBanner").style.display = "none";
    document.getElementById("warningBanner").style.display = "none";
  }

  // ------------------------------------------------------------------
  // Login form submit
  // ------------------------------------------------------------------
  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    clearMessages();

    var email    = document.getElementById("emailInput").value.trim();
    var password = document.getElementById("passwordInput").value;
    var btn      = document.getElementById("loginBtn");
    var spinner  = document.getElementById("spinner");

    btn.disabled = true;
    spinner.style.display = "block";

    fetch(BASE + "/api/v2/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password }),
    })
      .then(function (r) {
        return r.json().then(function (body) { return { ok: r.ok, body: body }; });
      })
      .then(function (res) {
        btn.disabled    = false;
        spinner.style.display = "none";

        if (!res.ok) {
          showError(res.body.detail || "Authentication failed");
          return;
        }

        var jwt = res.body.access_token;
        localStorage.setItem("morgana_jwt", jwt);

        if (res.body.default_password_warning) {
          // Store flag so index.html can show banner
          sessionStorage.setItem("morgana_pw_warning", "1");
        }

        window.location.replace("/ui/");
      })
      .catch(function (err) {
        btn.disabled    = false;
        spinner.style.display = "none";
        showError("Network error — is the server running?");
        console.error("[LOGIN] fetch error:", err);
      });
  });

  // Init
  loadProviderStatus();
  loadVersion();
})();
</script>
</body>
</html>
